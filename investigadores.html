<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#0C447C" />
  <title>Investigadores · RIISUPA</title>
  <meta name="description" content="Directorio de investigadores de las universidades miembros de RIISUPA con filtros por universidad, línea temática y proyecto." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Investigadores · RIISUPA" />
  <meta property="og:description" content="Directorio de investigadores de las universidades miembros de RIISUPA, con filtros por universidad, línea temática y proyecto." />
  <meta property="og:locale" content="es_AR" />
  <meta property="og:site_name" content="RIISUPA" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Investigadores · RIISUPA" />
  <meta name="twitter:description" content="Directorio de investigadores de las universidades miembros de RIISUPA, con filtros por universidad, línea temática y proyecto." />


  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" />
  <link rel="stylesheet" href="assets/css/riisupa.css" />
</head>
<body>

  <a href="#main" class="skip-link">Saltar al contenido principal</a>

  <div data-slot="header"></div>

  <main id="main">

    <header class="page-header">
      <div class="container">
        <p class="eyebrow">Directorio</p>
        <h1 class="display-lg text-balance">Investigadores</h1>
        <p class="lead">
          Las personas que hacen investigación en salud desde las universidades miembro. El directorio se actualiza colaborativamente; cada universidad mantiene los perfiles de su plantel.
        </p>
      </div>
    </header>

    <section class="filters">
      <div class="container">
        <form id="filtros-investigadores" style="--filter-count: 4;" class="filters-inner" onsubmit="event.preventDefault();" role="search" aria-label="Filtrar investigadores">
          <div class="filter-field">
            <label for="busqueda">Buscar por nombre o palabra clave</label>
            <input type="search" id="busqueda" name="busqueda" placeholder="Ej.: Martínez, FHIR, cardiología..." autocomplete="off" />
          </div>
          <div class="filter-field">
            <label for="universidad">Universidad</label>
            <select id="universidad" name="universidad">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="linea">Línea</label>
            <select id="linea" name="linea">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="categoria">Categoría</label>
            <select id="categoria" name="categoria">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="proyecto">Proyecto</label>
            <select id="proyecto" name="proyecto">
              <option value="">Todos</option>
            </select>
          </div>
          <button type="button" id="reset-filtros" class="filter-reset">Limpiar</button>
        </form>
      </div>
    </section>

    <section class="section" style="padding-top: 2rem;">
      <div class="container">
        <p class="results-meta" id="resultados-meta">—</p>
        <div class="grid" id="resultados" style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));"></div>
      </div>
    </section>

  </main>

  <div data-slot="footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/riisupa.js"></script>
  <script>
    RIISUPA_UI.mount('investigadores');

    const activos = RIISUPA.investigadores.filter(i => i.activo);

    /* Populate selects */
    const uniSelect = document.getElementById('universidad');
    [...RIISUPA.universidades].sort((a, b) => a.sigla.localeCompare(b.sigla)).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.sigla + ' — ' + u.nombre;
      uniSelect.appendChild(opt);
    });

    const lineaSelect = document.getElementById('linea');
    RIISUPA.lineas.filter(l => l.activa).forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.id;
      opt.textContent = l.nombre;
      lineaSelect.appendChild(opt);
    });

    const catSelect = document.getElementById('categoria');
    const categoriasUsadas = [...new Set(activos.map(i => i.categoria))];
    categoriasUsadas.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = RIISUPA.categoriaLabels[c] || c;
      catSelect.appendChild(opt);
    });

    const proySelect = document.getElementById('proyecto');
    RIISUPA.proyectos.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.titulo.length > 70 ? p.titulo.slice(0, 67) + '…' : p.titulo;
      proySelect.appendChild(opt);
    });

    /* Card render */
    function renderInvestigador(inv) {
      const inicial = (inv.nombre[0] + inv.apellido[0]).toUpperCase();
      const afiliaciones = inv.universidades
        .map(id => RIISUPA.helpers.getUniversidad(id))
        .filter(Boolean)
        .map(u => `<li style="font-size: 0.875rem; color: var(--ink-700);">${RIISUPA.helpers.escapeHTML(u.nombre)} <small style="color: var(--ink-500);">(${RIISUPA.helpers.escapeHTML(u.sigla)})</small></li>`)
        .join('');
      const lineasLabels = inv.lineas
        .map(id => RIISUPA.helpers.getLinea(id))
        .filter(Boolean)
        .map(l => `<span class="tag tag-primary">${RIISUPA.helpers.escapeHTML(l.nombre)}</span>`)
        .join('');
      const proyectosIP = RIISUPA.proyectos.filter(p => p.investigadorPrincipal === inv.id).length;
      const orcid = inv.orcid ? `<a href="https://orcid.org/${inv.orcid}" target="_blank" rel="noopener" style="font-family: var(--font-mono); font-size: 0.75rem;">ORCID ↗</a>` : '';
      return `
        <article class="card" id="${inv.id}">
          <div style="display: flex; gap: 1rem; align-items: flex-start;">
            <div class="card-avatar" aria-hidden="true">${inicial}</div>
            <div style="flex: 1; min-width: 0;">
              <h3 class="card-title" style="font-size: 1.125rem;">${RIISUPA.helpers.escapeHTML(inv.nombre)} ${RIISUPA.helpers.escapeHTML(inv.apellido)}</h3>
              <p style="margin: 0.25rem 0 0; font-size: 0.875rem; color: var(--ink-600);">${RIISUPA.helpers.escapeHTML(inv.cargo)}</p>
              <p class="metadata" style="margin-top: 0.5rem;">${RIISUPA.categoriaLabels[inv.categoria]}</p>
            </div>
          </div>

          <div style="margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--rule);">
            <p class="metadata">Afiliación</p>
            <ul style="list-style: none; padding: 0; margin: 0.5rem 0 0; display: flex; flex-direction: column; gap: 0.25rem;">
              ${afiliaciones}
            </ul>
          </div>

          ${lineasLabels ? `<div class="card-tags">${lineasLabels}</div>` : ''}

          <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;">
            <span class="metadata">${proyectosIP > 0 ? 'Lidera ' + proyectosIP + ' proyecto' + (proyectosIP === 1 ? '' : 's') : 'Participante'}</span>
            ${orcid}
          </div>
        </article>
      `;
    }

    /* Filter logic */
    function filtrar(datos, state) {
      return datos.filter(inv => {
        if (state.busqueda) {
          const q = RIISUPA.helpers.normalize(state.busqueda);
          const hay = RIISUPA.helpers.normalize(
            inv.nombre + ' ' + inv.apellido + ' ' + inv.cargo + ' ' + inv.palabrasClave.join(' ') + ' ' + inv.bio
          );
          if (!hay.includes(q)) return false;
        }
        if (state.universidad && !inv.universidades.includes(state.universidad)) return false;
        if (state.linea && !inv.lineas.includes(state.linea)) return false;
        if (state.categoria && inv.categoria !== state.categoria) return false;
        if (state.proyecto) {
          const proy = RIISUPA.helpers.getProyecto(state.proyecto);
          if (!proy) return false;
          const involved = proy.investigadorPrincipal === inv.id;
          if (!involved) return false;
        }
        return true;
      });
    }

    RIISUPA_UI.initFiltros({
      filtrosId: 'filtros-investigadores',
      resultadosId: 'resultados',
      metaId: 'resultados-meta',
      resetId: 'reset-filtros',
      datos: activos.sort((a, b) => a.apellido.localeCompare(b.apellido)),
      filtrar,
      render: renderInvestigador,
      etiquetaResultado: 'investigadores',
    });

    if (window.location.hash) {
      setTimeout(() => {
        const target = document.querySelector(window.location.hash);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  </script>
</body>
</html>
